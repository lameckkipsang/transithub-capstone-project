<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="text-gray-800 font-sans h-full flex flex-col">
    <nav class="bg-white shadow-sm py-4 px-8 flex justify-between items-center">
        <a href="index.html" class="flex flex-row items-center gap-3 flex-shrink-0 font-bold text-xl tracking-tight text-blue-900">
                    <img src="assets/logo.png" alt="TransitHub Logo" class="h-10 w-10 rounded-full object-cover border border-gray-200 shadow-sm">TransitHub Solutions
        <a href="index.html" class="text-gray-600 hover:text-blue-600 font-medium">← Back to Home</a>
    </nav>
    <br>
    <br>
    <main class="flex-grow flex items-center justify-center px-4">
        <div class="max-w-md w-full bg-white p-8 rounded-xl shadow-xl border border-gray-100">
            <h2 class="text-3xl font-bold text-center text-blue-900 mb-6">Login/Sign Up</h2>
            
            <form action="dashboard.html" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input type="email" required class="w-full px-4 py-2 border rounded-lg focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" required class="w-full px-4 py-2 border rounded-lg focus:ring-blue-500 focus:border-blue-500">
                </div>
                <button type="submit" class="w-full bg-blue-900 text-white font-bold py-3 rounded-lg hover:bg-blue-800 transition shadow-md">
                    Login
                </button>
            </form>
            <div class="mt-8 text-center text-sm border-t pt-4">
                <span class="text-gray-500">Don't have an account?</span>
                <a href="signup.html" class="text-blue-600 font-bold hover:underline ml-1">Create one here.</a>
            </div>
        </div>
    </main>
    <br>
    <br>
    <footer class="bg-gray-900 text-gray-400 py-6 text-center text-sm mt-auto">
        <p>&copy; 2026 TransitHub Solutions. All rights reserved.</p>
    </footer>
    
</body>
</html>
