<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="text-gray-800 font-sans h-full flex flex-col">
    <nav class="bg-white shadow-sm py-4 px-8 flex justify-between items-center">
        <a href="index.html" class="font-bold text-xl text-blue-900">TransitHub</a>
        <a href="index.html" class="text-gray-600 hover:text-blue-600 font-medium">← Back to Home</a>
    </nav>
    <br>
    <br>
    <br>
    <main class="flex-grow flex items-center justify-center px-4">
        <div class="max-w-md w-full bg-white p-8 rounded-xl shadow-xl border border-gray-100">
            <h2 class="text-3xl font-bold text-center text-blue-900 mb-6">Create an Account</h2>
            
            <form action="login.html" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                    <input type="text" required class="w-full px-4 py-2 border rounded-lg focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input type="email" required class="w-full px-4 py-2 border rounded-lg focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" required class="w-full px-4 py-2 border rounded-lg focus:ring-blue-500 focus:border-blue-500">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition shadow-md">
                    Sign Up
                </button>
            </form>

            <div class="mt-8 text-center text-sm border-t pt-4">
                <span class="text-gray-500">Already registered?</span>
                <a href="login.html" class="text-blue-600 font-bold hover:underline ml-1">Log in here.</a>
            </div>
        </div>
    </main>
    <footer class="bg-gray-900 text-gray-400 py-6 text-center text-sm mt-auto">
        <p>&copy; 2026 TransitHub Solutions. All rights reserved.</p>
    </footer>
    
</body>
</html>
