<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="flex flex-col h-full font-sans text-gray-800">
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <a href="index.html" class="flex flex-row items-center gap-3 flex-shrink-0 font-bold text-xl tracking-tight text-blue-900">
                    <img src="assets/logo.png" alt="TransitHub Logo" class="h-10 w-10 rounded-full object-cover border border-gray-200 shadow-sm">TransitHub Solutions
                </a>
                <div class="hidden md:flex space-x-6 font-semibold text-sm items-center">
                    <a href="index.html" class="text-blue-600 transition">Home</a>
                    <a href="about.html" class="text-gray-700 hover:text-blue-600 transition">About Us</a>
                    <a href="contact.html" class="text-gray-700 hover:text-blue-600 transition">Contact</a>
                    <a href="login.html" class="text-gray-700 hover:text-blue-600 transition ml-4">Login</a>
                </div>
                <div class="md:hidden flex items-center">
                    <input type="checkbox" id="mobile-menu-toggle" class="peer hidden">
                    <label for="mobile-menu-toggle" class="text-gray-800 cursor-pointer p-2 hover:bg-gray-100 rounded-lg transition">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </label>

                    <div class="absolute top-16 left-0 w-full bg-white shadow-lg border-t border-gray-100 hidden peer-checked:flex flex-col py-2 px-4 z-50">
                        <a href="index.html" class="block font-semibold text-blue-600 py-3 border-b border-gray-50">Home</a>
                        <a href="about.html" class="block font-semibold text-gray-700 hover:text-blue-600 py-3 border-b border-gray-50 transition">About Us</a>
                        <a href="contact.html" class="block font-semibold text-gray-700 hover:text-blue-600 py-3 border-b border-gray-50 transition">Contact</a>
                        <a href="login.html" class="block font-semibold text-gray-700 hover:text-blue-600 py-3 transition">Login</a>
                    </div>
                </div>   
                </div>
            </div>
        </div>
    </nav>
    <main class="flex-grow flex items-center justify-center py-12 px-4">
        <div class="bg-white p-8 rounded-xl shadow-lg max-w-lg w-full border border-gray-100">
            <h2 class="text-3xl font-bold mb-6 text-blue-900 text-center">Get in Touch</h2>
            <p class="text-gray-600 text-sm text-center mb-8">Have a question about our logistics, or need help with a booking? Send us a message.</p>
            
            <form action="mailto:lameck.cs16@gmail.com" method="GET" enctype="text/plain" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Subject</label>
                    <input type="text" name="subject" required class="w-full px-4 py-2 border rounded-lg focus:ring-blue-500 focus:border-blue-500" placeholder="e.g., Issue with Car Hire">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Message</label>
                    <textarea name="body" required rows="5" class="w-full px-4 py-2 border rounded-lg focus:ring-blue-500 focus:border-blue-500" placeholder="Type your message here..."></textarea>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition shadow-md">
                    Send Email
                </button>
            </form>
        </div>
    </main>

    <footer class="bg-gray-900 text-gray-400 py-6 text-center text-sm">
        <p>&copy; 2026 TransitHub Solutions. All rights reserved.</p>
    </footer>
    
</body>
</html>
